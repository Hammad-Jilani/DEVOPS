# ─── App Info ────────────────────────────────────────────────────────────────
app.version=2.0.0
app.environment=production

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8091

# ─── H2 Database (Development) ───────────────────────────────────────────────
# Tasks persist across requests within a session but reset on restart.
# For full persistence swap to PostgreSQL below.
spring.datasource.url=jdbc:h2:mem:devopsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (handy for dev — disable in prod)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── PostgreSQL (Production) ─────────────────────────────────────────────────
# Uncomment and fill in to switch from H2 to PostgreSQL.
# Comment out the H2 block above when using this.
#
# spring.datasource.url=jdbc:postgresql://localhost:5432/devopsdb
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=your_pg_user
# spring.datasource.password=your_pg_password

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For PostgreSQL use: org.hibernate.dialect.PostgreSQLDialect

# ─── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
info.app.name=Spring DevOps Demo
info.app.version=${app.version}
info.app.environment=${app.environment}

# ─── Thymeleaf ───────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false