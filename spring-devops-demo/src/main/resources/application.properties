
app.version=2.0.0
app.environment=production

server.port=8091

spring.datasource.url=jdbc:h2:mem:devopsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── PostgreSQL (Production) ─────────────────────────────────────────────────
# spring.datasource.url=jdbc:postgresql://localhost:5432/devopsdb
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=your_pg_user
# spring.datasource.password=your_pg_password

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=email address
spring.mail.password=password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.reminder.cron=0 0 8 * * *

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
info.app.name=Spring DevOps Demo
info.app.version=${app.version}
info.app.environment=${app.environment}

spring.thymeleaf.cache=false