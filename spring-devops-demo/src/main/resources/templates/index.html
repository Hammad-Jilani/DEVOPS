<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Spring DevOps Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg:       #0a0e1a;
            --surface:  #111827;
            --surface2: #1a2235;
            --border:   #1f2937;
            --accent:   #00d4aa;
            --accent2:  #7c3aed;
            --text:     #e2e8f0;
            --muted:    #6b7280;
            --high:     #ef4444;
            --med:      #f59e0b;
            --low:      #3b82f6;
            --done:     #10b981;
            --overdue:  #ff6b6b;
            --today:    #fbbf24;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height:100vh; }

        /* ── Topbar ────────────────────────────────────────────────────────── */
        .topbar {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 1rem 2rem; display: flex; justify-content: space-between;
            align-items: center; position: sticky; top:0; z-index:100;
        }
        .topbar .logo { font-family:'JetBrains Mono',monospace; color:var(--accent); font-size:1.1rem; font-weight:700; }
        .topbar .logo span { color:var(--muted); }
        .topbar-right { display:flex; align-items:center; gap:0.75rem; }
        .env-badge {
            font-family:'JetBrains Mono',monospace; font-size:0.75rem;
            background:rgba(0,212,170,0.1); color:var(--accent);
            border:1px solid rgba(0,212,170,0.3); padding:0.25rem 0.75rem; border-radius:999px;
        }
        .admin-badge {
            font-family:'JetBrains Mono',monospace; font-size:0.72rem;
            background:rgba(124,58,237,0.15); color:#a78bfa;
            border:1px solid rgba(124,58,237,0.3); padding:0.22rem 0.65rem; border-radius:999px;
        }
        .user-badge { font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:var(--muted); display:flex; align-items:center; gap:0.4rem; }
        .user-badge .user-dot { width:7px; height:7px; border-radius:50%; background:var(--done); box-shadow:0 0 5px var(--done); }
        .btn-logout {
            font-family:'JetBrains Mono',monospace; font-size:0.72rem;
            background:rgba(239,68,68,0.1); color:#fca5a5;
            border:1px solid rgba(239,68,68,0.25); padding:0.22rem 0.65rem;
            border-radius:999px; cursor:pointer; transition:background 0.2s;
        }
        .btn-logout:hover { background:rgba(239,68,68,0.2); }

        /* ── Layout ────────────────────────────────────────────────────────── */
        .container { max-width:1040px; margin:0 auto; padding:2rem; }

        /* ── Stats ─────────────────────────────────────────────────────────── */
        .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:2rem; }
        .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.25rem; text-align:center; }
        .stat-card .num { font-size:2.5rem; font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--accent); }
        .stat-card .label { font-size:0.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-top:0.25rem; }

        /* ── Progress ──────────────────────────────────────────────────────── */
        .progress-bar-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.25rem; margin-bottom:2rem; }
        .progress-label { display:flex; justify-content:space-between; margin-bottom:0.5rem; font-size:0.85rem; color:var(--muted); }
        .progress-bar { height:8px; background:var(--border); border-radius:999px; overflow:hidden; }
        .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:999px; transition:width 0.6s ease; }

        /* ── Filter bar ────────────────────────────────────────────────────── */
        .filter-bar {
            background:var(--surface); border:1px solid var(--border); border-radius:12px;
            padding:1rem 1.25rem; margin-bottom:1.25rem; display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap;
        }
        .search-wrap { flex:1; min-width:160px; position:relative; }
        .search-wrap svg { position:absolute; left:0.75rem; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
        .filter-bar input[type="text"] {
            width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px;
            color:var(--text); padding:0.55rem 0.9rem 0.55rem 2.25rem; font-family:inherit; font-size:0.88rem; outline:none; transition:border-color 0.2s;
        }
        .filter-bar input[type="text"]:focus { border-color:var(--accent); }
        .filter-bar select {
            background:var(--bg); border:1px solid var(--border); border-radius:8px;
            color:var(--text); padding:0.55rem 0.9rem; font-family:inherit; font-size:0.88rem; outline:none; cursor:pointer;
        }
        .filter-bar select:focus { border-color:var(--accent); }
        .btn-filter { background:var(--accent); color:#000; border:none; border-radius:8px; padding:0.55rem 1.1rem; font-family:inherit; font-weight:700; font-size:0.85rem; cursor:pointer; white-space:nowrap; transition:opacity 0.2s; }
        .btn-filter:hover { opacity:0.85; }
        .btn-clear { background:transparent; color:var(--muted); border:1px solid var(--border); border-radius:8px; padding:0.55rem 0.9rem; font-family:inherit; font-size:0.85rem; cursor:pointer; text-decoration:none; transition:color 0.2s,border-color 0.2s; white-space:nowrap; }
        .btn-clear:hover { color:var(--text); border-color:var(--muted); }

        /* ── Add-task form ─────────────────────────────────────────────────── */
        .add-form { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.5rem; margin-bottom:2rem; }
        .add-form h3 { font-size:0.9rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:1rem; }
        .form-row { display:grid; grid-template-columns:1.5fr 1.5fr auto auto auto auto; gap:0.75rem; align-items:end; }
        @media(max-width:860px){ .form-row { grid-template-columns:1fr 1fr; } }
        .form-group { display:flex; flex-direction:column; gap:0.35rem; }
        .form-group label { font-size:0.78rem; color:var(--muted); }
        .form-group input, .form-group select { background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:0.6rem 0.9rem; font-family:inherit; font-size:0.9rem; outline:none; transition:border-color 0.2s; }
        .form-group input[type="date"] { color-scheme:dark; }
        .form-group input:focus, .form-group select:focus { border-color:var(--accent); }
        .btn-add { background:var(--accent); color:#000; border:none; border-radius:8px; padding:0.65rem 1.25rem; font-family:inherit; font-weight:700; font-size:0.9rem; cursor:pointer; white-space:nowrap; transition:opacity 0.2s; align-self:end; }
        .btn-add:hover { opacity:0.85; }

        /* ── Admin actions bar ─────────────────────────────────────────────── */
        .admin-actions { display:flex; justify-content:flex-end; margin-bottom:1rem; gap:0.5rem; }
        .btn-trigger-email {
            font-family:'JetBrains Mono',monospace; font-size:0.75rem;
            background:rgba(124,58,237,0.12); color:#a78bfa;
            border:1px solid rgba(124,58,237,0.3); border-radius:8px;
            padding:0.4rem 0.9rem; cursor:pointer; transition:background 0.2s;
        }
        .btn-trigger-email:hover { background:rgba(124,58,237,0.22); }

        /* ── Task list ─────────────────────────────────────────────────────── */
        .tasks-section h2 { font-size:0.9rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem; }
        .task-count-badge { font-family:'JetBrains Mono',monospace; background:var(--surface); border:1px solid var(--border); border-radius:999px; font-size:0.72rem; padding:0.1rem 0.5rem; color:var(--muted); }
        .task-list { display:flex; flex-direction:column; gap:0.6rem; }

        .task-card {
            background:var(--surface); border:1px solid var(--border); border-radius:10px;
            padding:1rem 1.25rem; display:flex; align-items:center; gap:1rem; transition:border-color 0.2s;
        }
        .task-card:hover { border-color:rgba(0,212,170,0.3); }
        .task-card.completed { opacity:0.5; }
        .task-card.completed .task-title { text-decoration:line-through; }
        .task-card.overdue   { border-color:rgba(255,107,107,0.35); background:rgba(255,107,107,0.04); }
        .task-card.due-today { border-color:rgba(251,191,36,0.35);  background:rgba(251,191,36,0.04); }

        .priority-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
        .priority-HIGH   { background:var(--high); box-shadow:0 0 6px var(--high); }
        .priority-MEDIUM { background:var(--med);  box-shadow:0 0 6px var(--med); }
        .priority-LOW    { background:var(--low);  box-shadow:0 0 6px var(--low); }

        .task-info { flex:1; min-width:0; }
        .task-title { font-weight:600; font-size:0.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .task-desc  { font-size:0.8rem; color:var(--muted); margin-top:0.2rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

        .task-meta { display:flex; gap:0.5rem; align-items:center; margin-top:0.4rem; flex-wrap:wrap; }
        .due-pill { font-family:'JetBrains Mono',monospace; font-size:0.7rem; padding:0.15rem 0.55rem; border-radius:999px; font-weight:700; }
        .due-pill.overdue  { background:rgba(255,107,107,0.15); color:var(--overdue); border:1px solid rgba(255,107,107,0.35); }
        .due-pill.today    { background:rgba(251,191,36,0.15);  color:var(--today);   border:1px solid rgba(251,191,36,0.35); }
        .due-pill.upcoming { background:rgba(59,130,246,0.1);   color:var(--low);     border:1px solid rgba(59,130,246,0.25); }
        .due-pill.done     { background:rgba(16,185,129,0.1);   color:var(--done);    border:1px solid rgba(16,185,129,0.25); }

        /* Assignee chip */
        .assignee-chip {
            display:inline-flex; align-items:center; gap:0.3rem;
            font-family:'JetBrains Mono',monospace; font-size:0.69rem;
            background:rgba(124,58,237,0.1); color:#c4b5fd;
            border:1px solid rgba(124,58,237,0.25); padding:0.12rem 0.55rem; border-radius:999px;
        }
        .assignee-chip .a-dot { width:5px; height:5px; border-radius:50%; background:#a78bfa; }
        .unassigned-chip {
            font-family:'JetBrains Mono',monospace; font-size:0.69rem;
            color:var(--muted); border:1px dashed var(--border); padding:0.12rem 0.55rem; border-radius:999px;
        }

        /* Inline assign dropdown (admin only) */
        .assign-form { display:inline-flex; align-items:center; gap:0.3rem; }
        .assign-form select {
            background:var(--bg); border:1px solid var(--border); border-radius:6px;
            color:var(--text); padding:0.25rem 0.5rem; font-family:'JetBrains Mono',monospace;
            font-size:0.72rem; outline:none; cursor:pointer; max-width:130px;
        }
        .btn-assign { background:rgba(124,58,237,0.15); color:#a78bfa; border:1px solid rgba(124,58,237,0.3); border-radius:6px; padding:0.25rem 0.55rem; font-size:0.72rem; font-family:inherit; cursor:pointer; transition:opacity 0.2s; }
        .btn-assign:hover { opacity:0.75; }

        .task-actions { display:flex; gap:0.5rem; flex-shrink:0; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
        .btn-toggle, .btn-delete { border:none; border-radius:6px; padding:0.35rem 0.75rem; font-size:0.78rem; font-family:inherit; cursor:pointer; transition:opacity 0.2s; }
        .btn-toggle { background:rgba(0,212,170,0.15); color:var(--accent); }
        .btn-toggle:hover { opacity:0.7; }
        .btn-delete { background:rgba(239,68,68,0.15); color:var(--high); }
        .btn-delete:hover { opacity:0.7; }

        /* ── Empty state ───────────────────────────────────────────────────── */
        .empty-state { text-align:center; padding:3rem 1rem; color:var(--muted); font-size:0.9rem; border:1px dashed var(--border); border-radius:12px; }
        .empty-state .icon { font-size:2.5rem; margin-bottom:0.75rem; }

        /* ── Toast ─────────────────────────────────────────────────────────── */
        #toast-container { position:fixed; bottom:1.5rem; right:1.5rem; z-index:9999; display:flex; flex-direction:column; gap:0.6rem; pointer-events:none; }
        .toast { display:flex; align-items:center; gap:0.75rem; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:0.8rem 1.1rem; font-size:0.875rem; font-weight:500; box-shadow:0 8px 32px rgba(0,0,0,0.4); min-width:240px; max-width:380px; pointer-events:all; animation:toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; }
        .toast.hiding { animation:toastOut 0.25s ease forwards; }
        .toast .toast-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
        .toast.success .toast-dot { background:var(--done); box-shadow:0 0 6px var(--done); }
        .toast.error   .toast-dot { background:var(--high); box-shadow:0 0 6px var(--high); }
        .toast .toast-msg { flex:1; }
        .toast .toast-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem; line-height:1; padding:0 0.1rem; transition:color 0.15s; }
        .toast .toast-close:hover { color:var(--text); }
        @keyframes toastIn  { from{opacity:0;transform:translateX(1rem) scale(0.95)} to{opacity:1;transform:translateX(0) scale(1)} }
        @keyframes toastOut { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(1rem)} }

        /* ── Footer ────────────────────────────────────────────────────────── */
        .footer { text-align:center; padding:2rem; color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:0.75rem; border-top:1px solid var(--border); margin-top:2rem; }
        .footer a { color:var(--accent); text-decoration:none; }
    </style>
</head>
<body>

<!-- ── Topbar ──────────────────────────────────────────────────────────────── -->
<div class="topbar">
    <div class="logo">spring<span>/</span>devops-demo</div>
    <div class="topbar-right">
        <div class="env-badge" th:text="'v' + ${appVersion} + ' · ' + ${environment}">v2.0.0 · production</div>
        <span class="admin-badge" sec:authorize="hasRole('ADMIN')">ADMIN</span>
        <div class="user-badge" sec:authorize="isAuthenticated()">
            <span class="user-dot"></span>
            <span sec:authentication="name">user</span>
        </div>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-logout">logout</button>
        </form>
    </div>
</div>

<!-- ── Toast container ─────────────────────────────────────────────────────── -->
<div id="toast-container"></div>
<div id="flash-data" th:if="${toast}" th:data-msg="${toast}" th:data-type="${toastType}" style="display:none"></div>

<div class="container">

    <!-- ── Stats ────────────────────────────────────────────────────────────── -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="num" th:text="${totalCount}">4</div>
            <div class="label">Total Tasks</div>
        </div>
        <div class="stat-card">
            <div class="num" th:text="${completedCount}">2</div>
            <div class="label">Completed</div>
        </div>
        <div class="stat-card">
            <div class="num" th:text="${pendingCount}">2</div>
            <div class="label">Pending</div>
        </div>
    </div>

    <!-- ── Progress ─────────────────────────────────────────────────────────── -->
    <div class="progress-bar-wrap">
        <div class="progress-label">
            <span>Pipeline Progress</span>
            <span th:text="${progressPct + '%'}">50%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" th:style="'width:' + ${progressPct} + '%'"></div>
        </div>
    </div>

    <!-- ── Search & Filter ──────────────────────────────────────────────────── -->
    <form method="get" th:action="@{/}" id="filter-form">
        <div class="filter-bar">
            <div class="search-wrap">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" name="search" placeholder="Search tasks…" th:value="${currentSearch}"/>
            </div>
            <select name="priority">
                <option value=""       th:selected="${currentPriority == ''}">All Priorities</option>
                <option value="HIGH"   th:selected="${currentPriority == 'HIGH'}">HIGH</option>
                <option value="MEDIUM" th:selected="${currentPriority == 'MEDIUM'}">MEDIUM</option>
                <option value="LOW"    th:selected="${currentPriority == 'LOW'}">LOW</option>
            </select>
            <select name="status">
                <option value=""          th:selected="${currentStatus == ''}">All Status</option>
                <option value="PENDING"   th:selected="${currentStatus == 'PENDING'}">Pending</option>
                <option value="COMPLETED" th:selected="${currentStatus == 'COMPLETED'}">Completed</option>
            </select>
            <!-- Admin-only: filter by assignee -->
            <select name="assigneeUsername" th:if="${isAdmin}">
                <option value="" th:selected="${currentAssigneeUsername == ''}">All Assignees</option>
                <option th:each="u : ${allUsers}"
                        th:value="${u.username}"
                        th:text="${u.username}"
                        th:selected="${currentAssigneeUsername == u.username}">user</option>
            </select>
            <button type="submit" class="btn-filter">Filter</button>
            <a href="/" class="btn-clear">Clear</a>
        </div>
    </form>

    <!-- ── Add-task form (admin only) ───────────────────────────────────────── -->
    <div class="add-form" th:if="${isAdmin}">
        <h3>+ New Task</h3>
        <form th:action="@{/tasks/add}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" name="title" placeholder="e.g. Configure Nginx" required/>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" name="description" placeholder="Short description"/>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select name="priority">
                        <option value="HIGH">HIGH</option>
                        <option value="MEDIUM" selected>MEDIUM</option>
                        <option value="LOW">LOW</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" name="dueDate"/>
                </div>
                <div class="form-group">
                    <label>Assignee</label>
                    <select name="assigneeId">
                        <option value="">— Unassigned —</option>
                        <option th:each="u : ${allUsers}"
                                th:value="${u.id}"
                                th:text="${u.username}">user</option>
                    </select>
                </div>
                <br>
                <button type="submit" class="btn-add">Add Task</button>
            </div>
        </form>
    </div>

    <!-- ── Admin toolbar: manual email trigger ──────────────────────────────── -->
    <div class="admin-actions" th:if="${isAdmin}">
        <form th:action="@{/admin/reminders/trigger}" method="post">
            <button type="submit" class="btn-trigger-email"
                    title="Send reminder emails right now for tasks due tomorrow">
                ✉ Send Reminders Now
            </button>
        </form>
    </div>

    <!-- ── Task list ────────────────────────────────────────────────────────── -->
    <div class="tasks-section">
        <h2>
            <span th:text="${isAdmin ? 'All Tasks' : 'My Tasks'}">Tasks</span>
            <span class="task-count-badge" th:text="${tasks.size()}">0</span>
        </h2>

        <div th:if="${#lists.isEmpty(tasks)}" class="empty-state">
            <div class="icon" th:text="${isAdmin ? '🔍' : '📭'}">🔍</div>
            <div th:text="${isAdmin ? 'No tasks match your filters.' : 'No tasks have been assigned to you yet.'}">No tasks.</div>
        </div>

        <div class="task-list" th:unless="${#lists.isEmpty(tasks)}">
            <div th:each="task : ${tasks}"
                 th:classappend="${task.completed} ? ' completed' : (${task.overdue} ? ' overdue' : (${task.dueToday} ? ' due-today' : ''))"
                 class="task-card">

                <div class="priority-dot" th:classappend="'priority-' + ${task.priority}"></div>

                <div class="task-info">
                    <div class="task-title" th:text="${task.title}">Task</div>
                    <div class="task-desc"  th:text="${task.description}">Description</div>

                    <div class="task-meta">
                        <!-- Due date pill -->
                        <span th:if="${task.dueDate != null and task.completed}"
                              class="due-pill done"
                              th:text="'✓ ' + ${#temporals.format(task.dueDate, 'MMM d')}"></span>
                        <span th:if="${task.dueDate != null and !task.completed and task.overdue}"
                              class="due-pill overdue"
                              th:text="'⚠ Overdue · ' + ${#temporals.format(task.dueDate, 'MMM d')}"></span>
                        <span th:if="${task.dueDate != null and !task.completed and task.dueToday}"
                              class="due-pill today">⏰ Due Today</span>
                        <span th:if="${task.dueDate != null and !task.completed and !task.overdue and !task.dueToday}"
                              class="due-pill upcoming"
                              th:text="'📅 ' + ${#temporals.format(task.dueDate, 'MMM d')}"></span>

                        <!-- Assignee chip (read-only view) -->
                        <span th:if="${task.assignee != null}" class="assignee-chip">
                            <span class="a-dot"></span>
                            <span th:text="${task.assignee.username}">user</span>
                        </span>
                        <span th:if="${task.assignee == null and isAdmin}" class="unassigned-chip">unassigned</span>
                    </div>
                </div>

                <div class="task-actions">
                    <!-- Inline assign dropdown — admin only -->
                    <form th:if="${isAdmin}"
                          th:action="@{'/tasks/' + ${task.id} + '/assign'}"
                          method="post" class="assign-form">
                        <select name="assigneeId">
                            <option value="" th:selected="${task.assignee == null}">— None —</option>
                            <option th:each="u : ${allUsers}"
                                    th:value="${u.id}"
                                    th:text="${u.username}"
                                    th:selected="${task.assignee != null and task.assignee.id == u.id}">user</option>
                        </select>
                        <button type="submit" class="btn-assign">Assign</button>
                    </form>

                    <!-- Toggle -->
                    <form th:action="@{'/tasks/' + ${task.id} + '/toggle'}" method="post" style="display:inline">
                        <button type="submit" class="btn-toggle"
                                th:text="${task.completed} ? 'Undo' : 'Done'">Done</button>
                    </form>

                    <!-- Delete — admin only -->
                    <form th:if="${isAdmin}"
                          th:action="@{'/tasks/' + ${task.id} + '/delete'}" method="post" style="display:inline">
                        <button type="submit" class="btn-delete">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ── Toast JS ────────────────────────────────────────────────────────────── -->
<script>
    (function () {
        const container = document.getElementById('toast-container');

        function showToast(msg, type) {
            const t = document.createElement('div');
            t.className = 'toast ' + (type || 'success');
            t.innerHTML = `<span class="toast-dot"></span><span class="toast-msg">${msg}</span><button class="toast-close" aria-label="Dismiss">✕</button>`;
            container.appendChild(t);
            const dismiss = () => {
                t.classList.add('hiding');
                t.addEventListener('animationend', () => t.remove(), { once: true });
            };
            t.querySelector('.toast-close').addEventListener('click', dismiss);
            setTimeout(dismiss, 4500);
        }

        const flash = document.getElementById('flash-data');
        if (flash) showToast(flash.dataset.msg, flash.dataset.type);

        // Debounced live search
        const searchInput = document.querySelector('#filter-form input[name="search"]');
        if (searchInput) {
            let timer;
            searchInput.addEventListener('input', () => {
                clearTimeout(timer);
                timer = setTimeout(() => document.getElementById('filter-form').submit(), 400);
            });
        }
    })();
</script>
