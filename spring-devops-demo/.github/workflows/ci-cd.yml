
name: CI/CD Pipeline

on:
  push:
    branches: [ main ]          # every push to main triggers the full pipeline
  pull_request:
    branches: [ main ]          # PRs only run CI (build + test), not deployment
  workflow_dispatch:            # allows manual trigger from the GitHub Actions UI

env:
  JAVA_VERSION: '17'
  IMAGE_NAME:   ${{ secrets.DOCKER_USERNAME }}/spring-devops-demo

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest         # GitHub-hosted runner (free for public repos)

    steps:

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn --no-transfer-progress verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7           # auto-deleted after 7 days to save storage


  docker-build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test           # wait for Job 1 to succeed

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:

      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Image digest
        run: echo "Pushed image digest ${{ steps.build.outputs.digest }}"


  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker-build-push        # wait for Job 2 to succeed
    environment: production         # ties this job to a GitHub "Environment"

    steps:

      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}

          timeout:     60s

          command_timeout: 5m
          script: |

            # ── Pull the latest image ──────────────────────────────────────
            # Always pull so we get the freshly-pushed image.
            echo "Pulling latest image..."
            docker pull ${{ env.IMAGE_NAME }}:latest

            # ── Stop and remove the old container ─────────────────────────
            # `|| true` prevents the step from failing if no container exists
            # yet (first deployment).
            echo "Stopping old container..."
            docker stop  devops-app 2>/dev/null || true
            docker rm    devops-app 2>/dev/null || true

            # ── Start the new container ────────────────────────────────────
            # Every secret is injected as an environment variable so nothing
            # sensitive ever lives on the EC2 filesystem.
            #
            # --restart unless-stopped: container auto-restarts after EC2 reboots.
            # -d: detached mode (runs in background, SSH session can close).
            # -p 8091:8091: maps host port to container port.
            # --name devops-app: gives the container a stable name for management.
            echo "Starting new container..."
            docker run -d \
              --name devops-app \
              --restart unless-stopped \
              -p 8091:8091 \
              -e SPRING_DATASOURCE_URL="${{ secrets.SPRING_DATASOURCE_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.POSTGRES_USER }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
              -e SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT="org.hibernate.dialect.PostgreSQLDialect" \
              -e SPRING_JPA_HIBERNATE_DDL_AUTO="update" \
              -e SPRING_H2_CONSOLE_ENABLED="false" \
              -e SPRING_MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
              -e SPRING_MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
              -e APP_ENVIRONMENT="production" \
              ${{ env.IMAGE_NAME }}:latest

            # ── Wait for the app to become healthy ─────────────────────────
            # Polls /actuator/health every 5 seconds for up to 90 seconds.
            # Fails the deployment if the app never reports UP.
            echo "Waiting for app to become healthy..."
            for i in $(seq 1 18); do
              STATUS=$(curl -sf http://localhost:8091/actuator/health 2>/dev/null \
                       | grep -o '"status":"UP"' || echo "")
              if [ -n "$STATUS" ]; then
                echo "App is UP after $((i * 5)) seconds."
                break
              fi
              if [ "$i" -eq 18 ]; then
                echo "Health check timed out after 90 seconds. Deployment failed."
                docker logs devops-app --tail 50
                exit 1
              fi
              echo "  attempt $i/18 — waiting 5s..."
              sleep 5
            done

            # ── Clean up dangling images ───────────────────────────────────
            # Removes old untagged images to prevent disk fill-up on the EC2 instance.
            docker image prune -f

            echo "Deployment complete."